env:
  TERM: xterm-256color

window:
  padding:
    x: 15
    y: 5
  opacity: 0.5

  dynamic_padding: false

  decorations: none

  title: Alacritty

  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 5000

font:
  normal:
    family: Sarasa Mono SC
    style: Regular

  bold:
    family: Sarasa Mono SC
    style: Bold

  italic:
    family: Sarasa Mono SC
    style: Italic

  bold_italic:
    family: Sarasa Mono SC
    style: Bold Italic

  size: 14.0

draw_bold_text_with_bright_colors: true

selection:
  save_to_clipboard: true

cursor:
  style: Underline
  thickness: 0.25

live_config_reload: true

mouse:
  hide_when_typing: true

